name: Generate WaveNet TTS Audio

on:
  workflow_dispatch:  # 手動実行
  schedule:
    - cron: '0 3 * * *'  # 毎日 JST 12:00 に自動実行

jobs:
  generate-tts:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 最大5時間

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run TTS generation
        env:
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/generate-tts-audio.js
