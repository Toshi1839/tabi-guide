name: Generate English Content

on:
  workflow_dispatch:  # 手動実行
  schedule:
    - cron: '0 2 * * *'  # 毎日午前2時（JST 11時）に自動実行

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 最大6時間

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check remaining spots
        run: |
          node -e "
          const https = require('https');
          const req = https.request({
            hostname: 'wnyaofugzxfnwvmqluer.supabase.co',
            path: '/rest/v1/spots?name_en=is.null&select=id&limit=1',
            headers: {
              'apikey': '${{ secrets.SUPABASE_KEY }}',
              'Authorization': 'Bearer ${{ secrets.SUPABASE_KEY }}'
            }
          }, (res) => {
            let d = ''; res.on('data', c => d += c);
            res.on('end', () => {
              const data = JSON.parse(d);
              console.log('未生成スポット確認完了');
            });
          });
          req.end();
          "

      - name: Generate English content
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/generate-english-all.js

      - name: Report completion
        if: always()
        run: echo "English content generation completed"
